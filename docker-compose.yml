version: "3.9"

services:
  # ── FastAPI Backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mediasave-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env.example
    environment:
      - ALLOWED_ORIGINS=http://localhost:3000
      - TEMP_DIR=/tmp/video-downloader
    volumes:
      - tmp_downloads:/tmp/video-downloader
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Next.js Frontend ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mediasave-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  tmp_downloads:
    driver: local
